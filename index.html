<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="./src/images/mn_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mah Notes</title>
    <meta name="theme-color" content="#7C83FD">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <script>
        // Apply the saved theme + custom palette before first paint (no flash).
        (function () {
            try {
                var p = localStorage.getItem('mahnotes_theme') || 'system';
                var dark = p === 'dark' || (p === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
                document.documentElement.dataset.theme = dark ? 'dark' : 'light';
            } catch (e) {}
            try {
                var pal = JSON.parse(localStorage.getItem('mahnotes_palette') || 'null');
                if (pal) {
                    var map = { primary: '--primary', primaryEnd: '--primary-end', accent: '--accent',
                        accentEnd: '--accent-end', light: '--light', dark: '--dark', muted: '--muted' };
                    var el = document.documentElement;
                    for (var k in map) { if (pal[k]) el.style.setProperty(map[k], pal[k]); }
                }
            } catch (e) {}
        })();
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
